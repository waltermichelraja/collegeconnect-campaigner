name: Build Desktop App

on:
  push:
    branches: [main, v2]
    paths:
      - 'frontend/**'
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  build:
    if: "!contains(github.event.head_commit.message,'skip ci')"

    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]

    runs-on: ${{ matrix.os }}

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm install

      - name: Build React
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      - name: Update title in index.html
        shell: bash
        run: sed -i 's/<title>.*<\/title>/<title>WACampaigner<\/title>/g' dist/index.html

      - name: Build Electron
        run: npx electron-builder

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: WACampaigner-${{ matrix.os }}
          path: |
            frontend/dist/*.exe
            frontend/dist/*.AppImage
            frontend/dist/*.deb